{% include 'Inc/header.html' %}

<!--Formulario para Registar Ambiente de Formacion-->
<div class="ui container">
    <h1> Formulario para actualizar Ambientes de Formacion </h1>
    <form section="" method="post" id="formambiente" class="ui form">
        {% csrf_token %}
        {% for dato in ambiente %}
        <input type="hidden" name="id_ambiente" id="id_ambiente" value="{{ dato.id }}">
        <div class="two fields">
            <div class="field">
                <label for="nombre">Nombre del Ambiente</label>
                <input type="text" name="nombre" id="nombre" value="{{ dato.NombreAmbiente }}">
            </div>
            <div class="field">
                <label form="tipo">Tipo de Ambiente</label>
                <input type="text" name="tipo" id="tipo" value="{{ dato.TipoAmbiente }}">
            </div>
            <div class="field">
                <label for="observacion">Observacion del Ambiente</label>
                <input type="text" name="observacion" id="observacion" value="{{ dato.Observaciones }}">
            </div>
        </div>
        <div>
            <button type="submit" class="ui inverted green button">Actualizar Ambiente</button>
        </div>
        {% endfor %}
    </form>
</div>

<!--MENSAJE CON SEMANTIC-->
<br>
{% if messages %}
{% for mensaje in messages %}
<div class="ui container" id="mensajes">
    <div class="ui {{mensaje.tags}} message">
        <i class="close icon"></i>
        <div class="header">
            {{ mensaje }}
        </div>
    </div>
</div>
{% endfor %}
{% endif %}

{% include 'Inc/footer.html' %}
<script>
    $('.ui.form').form({
        inline: true,
        fields: {
            nombre: {
                identifier: 'nombre',
                rules: [
                    {
                        type: 'empty',
                        prompt: 'Debes Ingresar el Nombre del Ambiente'
                    }
                ]
            },
            tipo: {
                identifier: 'tipo',
                rules: [
                    {
                        type: 'empty',
                        prompt: 'Debes Ingresar el Tipo de Ambiente'
                    }
                ]
            },
            observacion: {
                identifier: 'observacion',
                rules: [
                    {
                        type: 'empty',
                        prompt: 'Debes ingresar la observacion del ambiente'
                    }
                ]
            }
        }
    })
        ;
</script>
