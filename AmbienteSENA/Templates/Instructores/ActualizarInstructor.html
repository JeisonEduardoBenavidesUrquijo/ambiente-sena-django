{% include 'Inc/header.html' %}

<!--Formulario para Registar Ambiente de Formacion-->
<div class="ui container">
    <h1> Formulario para actualizar Instructores </h1>
    <form section="" method="post" id="forminstructor" class="ui form">
        {% csrf_token %}
        {% for dato in instructor %}
        <div class="two fields">
            <div class="field">
                <label for="nombre">Nombre del Instructor</label>
                <input type="text" name="nombre" id="nombre" value="{{ dato.NombreCompleto }}">
            </div>
            <div class="field">
                <label form="area">Area del Instructor</label>
                <input type="text" name="area" id="area" value="{{ dato.Area }}">
            </div>
        </div>
        <div class="two fields">
            <div class="field">
                <label for="cedula">Cedula del Instructor</label>
                <input type="text" name="cedula" id="cedula" value="{{ dato.Cedula }}">
            </div>
            <div class="field">
                <label for="celular">Numero celular del Instructor</label>
                <input type="text" name="celular" id="celular" value="{{ dato.Celular }}">
            </div>
        </div>
        <div>
            <button type="submit" class="ui inverted green button">Actualizar Instructor</button>
        </div>
        {% endfor %}
    </form>
</div>

<!--MENSAJE CON SEMANTIC-->
<br>
{% if messages %}
{% for mensaje in messages %}
<div class="ui container" id="mensajes">
    <div class="ui {{mensaje.tags}} message">
        <i class="close icon"></i>
        <div class="header">
            {{ mensaje }}
        </div>
    </div>
</div>
{% endfor %}
{% endif %}

{% include 'Inc/footer.html' %}
<script>
    $('.ui.form').form({
        inline: true,
        fields: {
            nombre: {
                identifier: 'nombre',
                rules: [
                    {
                        type: 'empty',
                        prompt: 'Debes Ingresar el Nombre del Ambiente'
                    }
                ]
            },
            area: {
                identifier: 'area',
                rules: [
                    {
                        type: 'empty',
                        prompt: 'Debes Ingresar el Area del Instructor'
                    }
                ]
            },
            cedula: {
                identifier: 'cedula',
                rules: [
                    {
                        type: 'empty',
                        prompt: 'Debes ingresar el numero de cedula del instructor'
                    }
                ]
            },
            celular: {
                identifier: 'celular',
                rules: [
                    {
                        type: 'empty',
                        prompt: 'Debes ingresar el numero celular del instructor'
                    }
                ]
            }
        }
    });
</script>
